<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="navbar-container">
                <div class="nav-menu">
                    <a href="index.html" class="nav-link">Inicio</a>
                    <a href="#" class="nav-link">Productos</a>
                    <a href="contacto.html" class="nav-link">Contacto</a>
                </div>
                <a href="#" class="nav-link login">Iniciar Sesión</a>
            </div>
        </nav>
    </header>
    <main>
        <section class="contacto-seccion">
            <h1 class="titulo">Contacto</h1>
            <p class="descripcion">Escribe un mensaje o visítanos para hablar de tus tartas favoritas.</p>
            <div class="formulario-contacto">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label>Correo</label>
                    <input type="email" placeholder="ejemplo@correo.com">
                </div>
                <div class="form-group">
                    <label>Mensaje</label>
                    <textarea placeholder="Escribe tu consulta"></textarea>
                </div>
                <div class="form-group">
                    <button class="enviar" type="submit">Enviar Mensaje</button>
                </div>
            </div>
            <a href="index.html" class="boton-volver">Volver al inicio</a>
        </section>
    </main>
    <footer class="site-footer">
        <p class="footer-year">© 2026 Tartas</p>
        <span class="footer-watermark">Sabor hecho arte</span>
    </footer>
</body>

</html>
